name: m!lk News Update

on:
  push:
    branches:
      - main
    paths:
      - 'fetch_news.py'
      - 'backfill.py'
      - 'requirements.txt'
      - 'daily-fetch.yml'
  schedule:
    - cron: '0 0 * * *'    # 09:00 JST
    - cron: '0 3 * * *'    # 12:00 JST
    - cron: '0 9 * * *'    # 18:00 JST
    - cron: '0 15 * * *'   # 00:00 JST
  workflow_dispatch:         # 允許手動執行
    inputs:
      backfill:
        description: '回補歷史文章（true = 執行 backfill.py）'
        required: false
        default: 'false'
      since:
        description: '回補起始日期 (YYYY-MM-DD)，預設 2026-01-01'
        required: false
        default: '2026-01-01'
      repair_dates:
        description: '修復日期錯誤（true = backfill.py --repair-dates）'
        required: false
        default: 'false'
      repair_translations:
        description: '補翻譯（true = backfill.py --repair-translations）'
        required: false
        default: 'false'
      backfill_charts:
        description: '回補 Oricon 排行榜（true = backfill.py --backfill-charts --since SINCE）'
        required: false
        default: 'false'
      weekly_only:
        description: '排行榜回補只補週別，跳過日別（true = --weekly-only）'
        required: false
        default: 'false'
      repair_body:
        description: '重抓最近 90 天文章內文（true = backfill.py --repair-body，再接 --repair-translations）'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Fetch news & generate HTML
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.repair_dates }}" = "true" ]; then
            echo "=== Repair dates ==="
            python backfill.py --repair-dates
          fi
          if [ "${{ github.event.inputs.repair_translations }}" = "true" ]; then
            echo "=== Repair translations ==="
            python backfill.py --repair-translations
          fi
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            echo "=== Backfill ==="
            python backfill.py --since "${{ github.event.inputs.since || '2026-01-01' }}"
          fi
          if [ "${{ github.event.inputs.backfill_charts }}" = "true" ]; then
            echo "=== Backfill Charts ==="
            WCMD="python backfill.py --backfill-charts --since ${{ github.event.inputs.since || '2021-01-01' }}"
            if [ "${{ github.event.inputs.weekly_only }}" = "true" ]; then
              WCMD="$WCMD --weekly-only"
            fi
            eval $WCMD
          fi
          if [ "${{ github.event.inputs.repair_body }}" = "true" ]; then
            echo "=== Repair Body ==="
            python backfill.py --repair-body
            python backfill.py --repair-translations
          fi
          python fetch_news.py

      - name: Commit & push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add index.html articles.json schedule.html schedule.json goods.html goods.json releases.json album.html chart.html charts.json chart_scanned.json chart_daily_scanned.json sources.html DSC_3085.jpg
          git add editions_img_*.jpg 2>/dev/null || true
          git diff --staged --quiet || git commit -m "update: $(date -u +'%Y-%m-%d %H:%M')"
          git pull --rebase -X ours origin main
          git push
