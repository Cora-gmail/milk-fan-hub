name: m!lk News Update

on:
  schedule:
    - cron: '0 0 * * *'    # 09:00 JST - 完整更新（新聞+所有頁面）
    - cron: '0 3 * * *'    # 12:00 JST - 僅新聞
    - cron: '0 9 * * *'    # 18:00 JST - 僅新聞
    - cron: '0 15 * * *'   # 00:00 JST - 僅新聞
  workflow_dispatch:         # 允許手動執行
    inputs:
      backfill:
        description: '回補歷史文章（true = 執行 backfill.py）'
        required: false
        default: 'false'
      since:
        description: '回補起始日期 (YYYY-MM-DD)，預設 2026-01-01'
        required: false
        default: '2026-01-01'
      repair_dates:
        description: '修復日期錯誤（true = backfill.py --repair-dates）'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news & generate HTML
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.repair_dates }}" = "true" ]; then
            echo "=== Repair dates mode ==="
            python backfill.py --repair-dates
            python fetch_news.py
          elif [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            echo "=== Backfill mode ==="
            python backfill.py --since "${{ github.event.inputs.since || '2026-01-01' }}"
            python fetch_news.py
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "00" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Full update"
              python fetch_news.py
            else
              echo "News-only update (hour=$HOUR UTC)"
              NEWS_ONLY=1 python fetch_news.py
            fi
          fi

      - name: Commit & push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          HOUR=$(date -u +%H)
          if [ "${{ github.event.inputs.backfill }}" = "true" ] || [ "$HOUR" = "00" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git add index.html articles.json schedule.html schedule.json goods.html goods.json album.html sources.html DSC_3085.jpg
          else
            git add index.html articles.json
          fi
          git diff --staged --quiet || git commit -m "update: $(date -u +'%Y-%m-%d %H:%M')"
          git push
